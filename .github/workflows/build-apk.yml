name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    name: Build release APK (full + lite)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Download speech models (full variant only)
        working-directory: docs
        run: bash download-models.sh

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Decode release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 --decode > release.jks

      - name: Build release APKs
        run: ./gradlew assembleFullRelease assembleLiteRelease
        env:
          RELEASE_KEYSTORE_FILE: ${{ github.workspace }}/release.jks
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Upload full APK
        uses: actions/upload-artifact@v4
        with:
          name: moqi-im-android-full-release
          path: app/build/outputs/apk/full/release/*.apk
          if-no-files-found: error

      - name: Upload lite APK
        uses: actions/upload-artifact@v4
        with:
          name: moqi-im-android-lite-release
          path: app/build/outputs/apk/lite/release/*.apk
          if-no-files-found: error
