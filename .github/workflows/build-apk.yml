name: Build APK

on:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build debug APK (full + lite)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Download speech models (full variant only)
        working-directory: docs
        run: bash download-models.sh

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build debug APKs
        run: ./gradlew assembleFullDebug assembleLiteDebug

      - name: Upload full APK
        uses: actions/upload-artifact@v4
        with:
          name: moqi-im-android-full-debug
          path: app/build/outputs/apk/full/debug/*.apk
          if-no-files-found: error

      - name: Upload lite APK
        uses: actions/upload-artifact@v4
        with:
          name: moqi-im-android-lite-debug
          path: app/build/outputs/apk/lite/debug/*.apk
          if-no-files-f
          ound: error
