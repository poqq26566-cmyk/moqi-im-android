# 参考 moqi-im-windows：main 推送或手动触发 → 构建 APK → Artifact → 更新 nightly 预发布 Release（tag nightly）。
name: Nightly

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nightly-main
  cancel-in-progress: true

jobs:
  build-nightly:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Download speech models (full variant only)
        working-directory: docs
        run: bash download-models.sh

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build debug APKs
        run: ./gradlew assembleFullDebug assembleLiteDebug

      - name: Prepare APK filenames for release
        run: |
          set -e
          FULL=$(ls app/build/outputs/apk/full/debug/*.apk | head -1)
          LITE=$(ls app/build/outputs/apk/lite/debug/*.apk | head -1)
          cp "$FULL" moqi-im-android-full-nightly.apk
          cp "$LITE" moqi-im-android-lite-nightly.apk

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: moqi-im-android-nightly-${{ github.sha }}
          path: |
            moqi-im-android-full-nightly.apk
            moqi-im-android-lite-nightly.apk
          if-no-files-found: error

      - name: Publish nightly release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          TAG=nightly
          NOTES_FILE="${RUNNER_TEMP}/nightly-notes.md"
          RUN_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          {
            echo "Automated nightly build from \`main\`."
            echo ""
            echo "Commit: ${GITHUB_SHA}"
            echo "Run: ${RUN_URL}"
          } > "${NOTES_FILE}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag --force "${TAG}" "${GITHUB_SHA}"
          git push origin "refs/tags/${TAG}" --force

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" moqi-im-android-full-nightly.apk moqi-im-android-lite-nightly.apk --clobber
            gh release edit "${TAG}" --title "Nightly" --notes-file "${NOTES_FILE}"
          else
            gh release create "${TAG}" moqi-im-android-full-nightly.apk moqi-im-android-lite-nightly.apk \
              --title "Nightly" --notes-file "${NOTES_FILE}" --prerelease
          fi
