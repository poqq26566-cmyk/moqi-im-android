# 参考 moqi-im-windows：在 GitHub 上「发布」某个 Release（published）后构建并上传 APK 到该 Release 附件。
name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.release.tag_name || github.ref_name }}
  cancel-in-progress: true

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name || github.ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Download speech models (full variant only)
        working-directory: docs
        run: bash download-models.sh

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Decode release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 --decode > release.jks

      - name: Build release APKs
        run: ./gradlew assembleFullRelease assembleLiteRelease
        env:
          RELEASE_KEYSTORE_FILE: ${{ github.workspace }}/release.jks
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Prepare release APKs
        run: |
          set -e
          TAG="${{ github.event.release.tag_name }}"
          if [ -z "${TAG}" ]; then TAG="${GITHUB_SHA:0:7}"; fi
          echo "REL_TAG=${TAG}" >> "${GITHUB_ENV}"
          FULL=$(ls app/build/outputs/apk/full/release/*.apk | head -1)
          LITE=$(ls app/build/outputs/apk/lite/release/*.apk | head -1)
          cp "$FULL" "moqi-im-android-full-${TAG}.apk"
          cp "$LITE" "moqi-im-android-lite-${TAG}.apk"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: moqi-im-android-release-${{ github.event.release.tag_name || github.sha }}
          path: |
            moqi-im-android-full-${{ env.REL_TAG }}.apk
            moqi-im-android-lite-${{ env.REL_TAG }}.apk
          if-no-files-found: error

      - name: Upload assets to GitHub release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          TAG="${{ github.event.release.tag_name }}"
          gh release upload "${TAG}" \
            "moqi-im-android-full-${TAG}.apk" \
            "moqi-im-android-lite-${TAG}.apk" \
            --clobber
